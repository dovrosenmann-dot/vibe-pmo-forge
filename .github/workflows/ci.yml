name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Type Check & Lint
      run: bun run lint || true # Remove true when lint rules are strictly fixed

    - name: Run Unit Tests
      run: bun run test
      
    - name: Build
      run: bun run build
